name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Auto-bump, publish, release
    runs-on: ubuntu-latest
    # Skip version-bump tag pushes to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMP_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Verify .next is not in published package
        run: |
          PACKED=$(npm pack --dry-run 2>&1)
          if echo "$PACKED" | grep -q "\.next/"; then
            echo "ERROR: .next/ would be included in the published package!"
            echo "Remove .next/ from package.json 'files' array and/or .npmignore"
            exit 1
          fi
          echo "✓ .next/ not in package"

      - name: Resolve publish version (no git commit)
        id: bump
        run: |
          # Compare package.json version vs latest npm registry version.
          # If package.json is ahead (intentional major/minor bump), publish that version.
          # Otherwise patch-bump from the registry (normal flow, avoids duplicate version error).
          REGISTRY=$(npm view froggo-mission-control version 2>/dev/null || echo "0.0.0")
          PKG=$(node -e "process.stdout.write(require('./package.json').version)")
          NEW=$(node -e "
            const semver = (v) => v.split('.').map(Number);
            const gt = (a, b) => { for (let i=0; i<3; i++) { if (a[i]>b[i]) return true; if (a[i]<b[i]) return false; } return false; };
            const reg = semver('$REGISTRY');
            const pkg = semver('$PKG');
            if (gt(pkg, reg)) {
              process.stdout.write('$PKG');
            } else {
              process.stdout.write(reg[0]+'.'+reg[1]+'.'+(reg[2]+1));
            }
          ")
          # Only call npm version if we need to change from what's in package.json
          if [ "$NEW" != "$PKG" ]; then
            npm version $NEW --no-git-tag-version
          fi
          echo "version=v$NEW" >> $GITHUB_OUTPUT
          echo "Publishing v$NEW (registry was $REGISTRY, package.json was $PKG)"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release in git
        run: |
          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
