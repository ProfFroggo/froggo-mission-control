name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Auto-bump, publish, release
    runs-on: ubuntu-latest
    # Skip version-bump tag pushes to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMP_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Verify .next is not in published package
        run: |
          PACKED=$(npm pack --dry-run 2>&1)
          if echo "$PACKED" | grep -q "\.next/"; then
            echo "ERROR: .next/ would be included in the published package!"
            echo "Remove .next/ from package.json 'files' array and/or .npmignore"
            exit 1
          fi
          echo "✓ .next/ not in package"

      - name: Bump patch version (from registry, no git commit)
        id: bump
        run: |
          # Read the latest published version from npm — never from package.json in git
          # (package.json in git may lag behind if the bump commit can't push to protected main)
          CURRENT=$(npm view froggo-mission-control version 2>/dev/null || echo "0.0.0")
          NEW=$(node -e "const [a,b,c]='$CURRENT'.split('.'); process.stdout.write(a+'.'+b+'.'+(Number(c)+1))")
          npm version $NEW --no-git-tag-version
          echo "version=v$NEW" >> $GITHUB_OUTPUT
          echo "Bumped to v$NEW (was $CURRENT)"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release in git
        run: |
          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
