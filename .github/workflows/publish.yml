name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Auto-bump, publish, release
    runs-on: ubuntu-latest
    # Skip the bot's own version bump commits to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMP_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Bump patch version
        id: bump
        run: |
          NEW=$(npm version patch --no-git-tag-version)
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped to $NEW"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
