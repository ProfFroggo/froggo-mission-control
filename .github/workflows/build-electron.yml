name: Build Electron App

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggers

jobs:
  build-macos:
    name: Build macOS App (arm64)
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: |
          echo "Build artifacts:"
          ls -lh release/
          if [ -d "release/mac-arm64" ]; then
            ls -lh release/mac-arm64/
          fi

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v3
        with:
          name: froggo-macos-arm64
          path: release/mac-arm64/Froggo.app
          if-no-files-found: error
          retention-days: 30

      - name: Create release info
        run: |
          echo "Build completed at: $(date -u)" > release-info.txt
          echo "Commit: ${{ github.sha }}" >> release-info.txt
          echo "Branch: ${{ github.ref_name }}" >> release-info.txt
          echo "Triggered by: ${{ github.actor }}" >> release-info.txt
          if [ -f "release/mac-arm64/Froggo.app/Contents/Info.plist" ]; then
            echo "App version:" >> release-info.txt
            /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "release/mac-arm64/Froggo.app/Contents/Info.plist" >> release-info.txt
          fi
          cat release-info.txt

      - name: Upload release info
        uses: actions/upload-artifact@v3
        with:
          name: release-info
          path: release-info.txt

  notify:
    name: Notify Build Status
    runs-on: ubuntu-latest
    needs: [build-macos]
    if: always()
    
    steps:
      - name: Build Status
        run: |
          echo "Build completed!"
          echo "macOS build: ${{ needs.build-macos.result }}"
          if [ "${{ needs.build-macos.result }}" == "success" ]; then
            echo "✅ Build successful - artifacts uploaded"
          else
            echo "❌ Build failed - check logs"
            exit 1
          fi
